<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Portfolio | Beauty Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'lavender-main': '#8b5cf6',
                        'lavender-soft': '#f5f3ff',
                        'lavender-glow': '#ddd6fe',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-lavender-soft min-h-screen font-sans text-gray-900">

    <nav class="bg-white border-b border-lavender-glow p-6 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="window.location.href='provider_dashboard.html'">
                <div class="w-8 h-8 bg-lavender-main rounded-lg flex items-center justify-center text-white">
                    <i class="fas fa-arrow-left"></i>
                </div>
                <span class="text-xl font-bold italic text-gray-700">Back to Dashboard</span>
            </div>
            <h1 class="text-2xl font-serif font-bold text-lavender-main">My Portfolio Gallery</h1>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 lg:p-10">
        <div id="portfolioGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <div class="animate-pulse bg-white h-64 rounded-[2rem]"></div>
            <div class="animate-pulse bg-white h-64 rounded-[2rem]"></div>
            <div class="animate-pulse bg-white h-64 rounded-[2rem]"></div>
        </div>
    </main>

    <script>
        const token = localStorage.getItem('token');
        const API_BASE = 'http://localhost:5000/api/portfolio';

        if (!token) window.location.href = 'landing.html';

        async function fetchPortfolio() {
            try {
                const response = await fetch(`${API_BASE}/my-portfolio`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const images = await response.json();
                renderGallery(images);
            } catch (err) {
                console.error(err);
                document.getElementById('portfolioGrid').innerHTML = `<p class="text-red-500">Failed to load gallery.</p>`;
            }
        }

        function renderGallery(images) {
            const grid = document.getElementById('portfolioGrid');
            if (images.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-20 text-center">
                        <i class="fas fa-camera text-5xl text-lavender-glow mb-4"></i>
                        <p class="text-gray-400 text-lg">Your portfolio is empty. Add your first work from the dashboard!</p>
                    </div>`;
                return;
            }

            grid.innerHTML = images.map(img => `
                <div class="bg-white rounded-[2rem] overflow-hidden shadow-xl border border-white hover:scale-[1.02] transition-transform group">
                    <div class="relative h-64 overflow-hidden">
                        <img src="http://localhost:5000/uploads/${img.image_url}" 
                             alt="${img.description}" 
                             class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <button onclick="deleteImage(${img.id})" class="bg-red-500 text-white w-12 h-12 rounded-full shadow-lg hover:bg-red-600 transition">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="p-6">
                        <p class="font-bold text-gray-800 line-clamp-2">${img.description || 'Style Showcase'}</p>
                        <p class="text-xs text-gray-400 mt-2 uppercase tracking-widest font-bold">
                            Uploaded ${new Date(img.created_at).toLocaleDateString()}
                        </p>
                    </div>
                </div>
            `).join('');
        }

        async function deleteImage(id) {
            if (!confirm("Are you sure you want to remove this style from your portfolio?")) return;

            try {
                const res = await fetch(`${API_BASE}/delete/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    fetchPortfolio(); // Refresh the grid
                } else {
                    alert("Delete failed.");
                }
            } catch (err) {
                alert("Server error.");
            }
        }

        // Initialize
        fetchPortfolio();
    </script>
</body>
</html>
